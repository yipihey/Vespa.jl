name = "PPMKernels"
uuid = "1a2b3c4d-0007-4000-8000-000000000007"
authors = ["T. Abel and contributors"]
version = "0.1.0"

# KernelAbstractions is the single-source seam: one `@kernel` compiles to the CPU
# (the f64 parity oracle and f32 reference) and to Metal (f32-only, Apple GPU).
# Metal is a *weak* dependency loaded through a package extension so the core
# precompiles headless and on non-Apple CI — only Layer-A (f64-vs-Fortran) runs
# there; the Metal parity/accuracy layers light up wherever `using Metal` succeeds.
[deps]
KernelAbstractions = "63c18a36-062a-441e-b654-da1e3ab1ce7c"

[weakdeps]
CUDA = "052768ef-5323-5732-b1bb-66c8b64840ba"
Metal = "dde4c033-4e86-420c-a63e-0dd931031962"

[extensions]
PPMKernelsCUDAExt = "CUDA"
PPMKernelsMetalExt = "Metal"

[compat]
CUDA = "5"
KernelAbstractions = "0.9"
Metal = "1"
julia = "1.10"
