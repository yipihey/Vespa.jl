# Dedicated test environment for PPMKernels. Activating it (`--project=test`)
# makes its [sources] authoritative so the path-dev'd sibling packages resolve
# directly (the root-[sources] rule from CLAUDE.md). EnzoFixtures supplies the
# Tolerance/compare gate; EnzoLib runs the Fortran reference kernels for the
# golden fixtures; Metal (when present) enables the f32 CPU↔GPU parity layers.
[deps]
PPMKernels = "1a2b3c4d-0007-4000-8000-000000000007"
PoissonKernels = "1a2b3c4d-0008-4000-8000-000000000008"
EnzoFixtures = "1a2b3c4d-0005-4000-8000-000000000005"
EnzoLib = "1a2b3c4d-0004-4000-8000-000000000004"
KernelAbstractions = "63c18a36-062a-441e-b654-da1e3ab1ce7c"
Metal = "dde4c033-4e86-420c-a63e-0dd931031962"
Printf = "de0858da-6303-5e67-8744-51eddeeeb8d7"
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"

[sources]
PPMKernels = {path = ".."}
PoissonKernels = {path = "../../PoissonKernels"}
EnzoFixtures = {path = "../../EnzoFixtures"}
EnzoLib = {path = "../../EnzoLib"}
