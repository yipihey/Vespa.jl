# Dedicated test environment for MHDKernels. Activating it (`--project=test`) makes
# its [sources] authoritative so the path-dev'd package resolves directly. CUDA (when
# a device is present) enables the GPU cross-check (ref ≡ cube) + throughput; the core
# convergence/conservation gate runs CPU-f32 and needs only KernelAbstractions.
[deps]
MHDKernels = "1a2b3c4d-0009-4000-8000-000000000009"
KernelAbstractions = "63c18a36-062a-441e-b654-da1e3ab1ce7c"
CUDA = "052768ef-5323-5732-b1bb-66c8b64840ba"
Printf = "de0858da-6303-5e67-8744-51eddeeeb8d7"
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"

[sources]
MHDKernels = {path = ".."}
