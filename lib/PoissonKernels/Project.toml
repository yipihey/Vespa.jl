name = "PoissonKernels"
uuid = "1a2b3c4d-0008-4000-8000-000000000008"
authors = ["T. Abel and contributors"]
version = "0.1.0"

# A KernelAbstractions.jl port of Enzo's multigrid Poisson solver (the V-cycle
# behind grid::SolveForPotential): the mg_relax / mg_calc_defect / mg_restrict /
# mg_prolong / comp_accel Fortran kernels, written ONCE and run on the CPU (the
# f64 parity oracle + f32 reference) and on Metal (f32-only, Apple GPU).  Metal is
# a *weak* dependency loaded through a package extension so the core precompiles
# headless and on non-Apple CI — only the f64-vs-Fortran layer runs there; the
# Metal parity/accuracy layers light up wherever `using Metal` succeeds.
[deps]
KernelAbstractions = "63c18a36-062a-441e-b654-da1e3ab1ce7c"
FFTW = "7a1cc6ca-52ef-59f5-83cd-3a7055c09341"

[weakdeps]
Metal = "dde4c033-4e86-420c-a63e-0dd931031962"

[extensions]
PoissonKernelsMetalExt = "Metal"

[compat]
KernelAbstractions = "0.9"
FFTW = "1"
Metal = "1"
julia = "1.10"
