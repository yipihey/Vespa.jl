name = "ChemistryKernels"
uuid = "1a2b3c4d-0009-4000-8000-000000000009"
authors = ["T. Abel and contributors"]
version = "0.1.0"

# Table-free, device-agnostic reimplementation of the v2026 reduced primordial+D
# chemistry/cooling network (the model in lib/MultiCode/deps/grackle_reduced.c).
# Every reaction rate and cooling term is evaluated directly from its analytic fit
# (NO log-T tables / interpolation). One precision-generic `@kernel` per formula
# runs on the CPU (f64 parity oracle + f32) and on Metal (f32-only); Metal is a
# weak dependency behind a package extension so the core precompiles headless.
[deps]
KernelAbstractions = "63c18a36-062a-441e-b654-da1e3ab1ce7c"

[weakdeps]
Metal = "dde4c033-4e86-420c-a63e-0dd931031962"
CUDA = "052768ef-5323-5732-b1bb-66c8b64840ba"

[extensions]
ChemistryKernelsMetalExt = "Metal"
ChemistryKernelsCUDAExt = "CUDA"

[compat]
KernelAbstractions = "0.9"
Metal = "1"
CUDA = "5"
julia = "1.10"
